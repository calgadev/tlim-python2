<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLIM - Tibia Loot & Inventory Manager</title>

    <!-- Bootstrap via CDN — no installation required -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/users/">TLIM</a>

            <div class="navbar-nav ms-auto">
                <!-- Characters link — only shown when a user is selected -->
                {% if user_id %}
                <a class="nav-link" href="/characters/?user_id={{ user_id }}">Characters</a>
                {% endif %}

                <!-- Hunt and Inventory links — only shown when a character is selected -->
                {% if user_id and character_id %}
                <a class="nav-link" href="/hunt/?user_id={{ user_id }}&character_id={{ character_id }}">Hunt</a>
                <a class="nav-link" href="/inventory/?user_id={{ user_id }}&character_id={{ character_id }}">Inventory</a>
                <a class="nav-link" href="/items/?user_id={{ user_id }}&character_id={{ character_id }}">Items</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Flash messages — for success and error feedback -->
        {% if message %}
        <div class="alert alert-{{ message_type }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <!-- Each template fills this block with its own content -->
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
